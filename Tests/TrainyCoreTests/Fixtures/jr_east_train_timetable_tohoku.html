<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Trainy JR East timetable fixture</title>
  </head>
  <body>
    <main>
      <p class="line_name">Shinkansen Hayabusa 17 (Tokyo - Shin-Aomori)</p>
      <table>
        <tbody>
          <tr>
            <th>Train number</th>
            <td colspan="2">17B</td>
          </tr>
          <tr class="time">
            <th class="time">Tokyo</th>
            <td>09:36 <span class="dep_arr">Dep.</span></td>
            <td class="platform"><span>21</span></td>
          </tr>
          <tr class="time">
            <th class="time">Omiya</th>
            <td>10:01 <span class="dep_arr">Dep.</span></td>
            <td class="platform"><span>17</span></td>
          </tr>
          <tr class="time">
            <th class="time">Sendai</th>
            <td>11:07 <span class="dep_arr">Dep.</span></td>
            <td class="platform"><span>12</span></td>
          </tr>
          <tr class="time">
            <th class="time">Morioka</th>
            <td>11:48 <span class="dep_arr">Dep.</span></td>
            <td class="platform"><span>14</span></td>
          </tr>
          <tr class="time">
            <th class="time">Shin-Aomori</th>
            <td>12:49 <span class="dep_arr">Arr.</span></td>
            <td class="platform"><span>13</span></td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
