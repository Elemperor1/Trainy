name: Swift CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Configure Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: provider-proxy/package-lock.json

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show SDKs
        run: xcodebuild -showsdks

      - name: Run static and provider smoke gates
        run: |
          DEVELOPER_DIR="$(xcode-select -p)"
          export DEVELOPER_DIR
          bash -n scripts/*.sh scripts/lib/*.sh
          node --check app.js
          node --check components.js
          bash scripts/check-design-system-bypass.sh --self-test
          bash scripts/check-design-system-bypass.sh
          scripts/test-provider-smoke-pattern.sh
          python3 scripts/test-provider-secret-boundary.py
          scripts/smoke-source-provenance.sh
          scripts/smoke-provider-registry.sh
          scripts/smoke-shinkansen-provider.sh

      - name: Check credential-neutral provider proxy
        run: |
          npm ci --prefix provider-proxy
          npm run check --prefix provider-proxy

      - name: Build Trainy
        env:
          ODPT_ENV_FILE: /dev/null
          ODPT_CONSUMER_KEY: ""
        run: |
          DEVELOPER_DIR="$(xcode-select -p)"
          export DEVELOPER_DIR
          scripts/build-ios.sh

      - name: Check provider secret boundary
        run: scripts/check-provider-secret-boundary.py

      - name: Test Trainy
        env:
          ODPT_CONSUMER_KEY: ""
        run: |
          DEVELOPER_DIR="$(xcode-select -p)"
          export DEVELOPER_DIR
          xcodebuild test \
            -quiet \
            -project TrainyIOS/Trainy.xcodeproj \
            -scheme TrainyTests \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath /private/tmp/trainy-derived \
            -clonedSourcePackagesDirPath /private/tmp/trainy-source-packages \
            -packageCachePath /private/tmp/trainy-swiftpm-cache \
            -disableAutomaticPackageResolution \
            CODE_SIGNING_ALLOWED=NO \
            TRAINY_SOURCE_PACKAGES_DIR=/private/tmp/trainy-source-packages
